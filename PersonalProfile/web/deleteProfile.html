<html>
    <head>
        <title>Delete Profile</title>
        
        <style>
            body{
                font-family: Arial;
                background: #ffe6f2;
            }
            
            .container{
                width: 400px;
                background: white;
                margin: 100px auto;
                padding: 25px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px gray;
            }
            
            h2{
                text-align: center;
                color: #cc0066;
            }
            
            input{
                width: 100%;
                padding: 10px;
                margin-top: 10px;
                margin-bottom: 20px;
                box-sizing: border-box;
            }
            
            button{
                width: 100%;
                padding: 12px;
                background: #cc0066;
                color: white;
                border: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Delete Profile</h2>
            <form action="DeleteServlet" method="post">
                <input type="text" name="studentID" required>
                
                <button type="submit">
                    Delete Profile
                </button>
            </form>
        </div>
    </body>
</html>
