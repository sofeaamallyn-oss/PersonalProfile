<html>
    <head>
        <title>Search Profile</title>
        
        <style>
            
          body{
            font-family: Arial;
            background:#ffe6f2;
          }
          
          .container{
            width:400px;
            background:white;
            margin:80px auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px #ccc;
            text-align: center;
          }
          
          h2{
            color:#cc0066;  
            margin-bottom: 30px;
          }
          
          label{
              display: block;
              text-align: left;
              font-weight: bold;
              margin-bottom: 8px;
          }
          
          input{
              width: 100%;
              padding: 12px;
              border: 1px solid #ccc;
              border-radius: 8px;
              box-sizing: border-box;
              margin-bottom: 25px;
          }
          
          .button-group{
              margin-top: 20px;
              text-align: left;
          }
          
          .btn{
              display: block;
              width: 200px;
              margin: 15px auto;
              padding: 12px;
              background: #cc0066;
              color: white;
              text-decoration: none;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-size: 15px;
          }
          
          .btn:hover{
              background: #b30059;
          }
          
            
            
        </style>

    </head>
    <body>
        <div class="container">
            
            <h2>Search Profile</h2>
            <form action="SearchServlet" method="post">
                
                <label>Student ID</label>
                <input type="text" name="studentID" required>
                <button type="submit" class="btn">
                    Search
                </button>
                <a href="ViewProfilesServlet" class="btn">View All Profiles</a>
            </form>
        </div>
    </body>
</html>
